commands:
  - command: NEXTEST_EXPERIMENTAL_LIBTEST_JSON=1 cargo nextest run --no-fail-fast --message-format libtest-json 2>&1
    test_harness: cargo-nextest
  - command: |
      exit_code=0
      for script in tests/behaviors/operations/*.sh; do
        [ -f "$script" ] || continue
        echo "--- $script ---"
        if bash "$script"; then
          echo "ok $script"
        else
          echo "not ok $script"
          exit_code=1
        fi
      done
      exit $exit_code
    test_harness: shell-harness
